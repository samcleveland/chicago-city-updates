name: Download City Data

on:
  schedule:
    # Runs every day at 1 PM UTC
    - cron: "0 13 * * *"

  # Allows you to manually run it from GitHub
  workflow_dispatch:


jobs:
  download-data:

    runs-on: ubuntu-latest

    steps:

    # Get your code
    - name: Checkout repository
      uses: actions/checkout@v6

    # Install Python
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"


    # Install packages
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt


    # Run download script
    - name: Download city data
      env:
        DP_TOKEN: ${{ secrets.DP_TOKEN }}
      run: |
        tries=3
        for i in $(seq 1 $tries); do
          python src/active_businesses.py && break
          rc=$?
          echo "Attempt $i/$tries failed (rc=$rc)."
          if [ $i -lt $tries ]; then
            sleep $((i * 30))
            echo "Retrying..."
          else
            echo "All attempts failed."
            exit $rc
          fi
        done

    # Update data in repo
    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: "Update city data"
        title: "Automated city data update"
        branch: automated-city-data-update
        delete-branch: true

    - name: Enable Auto Merge
      if: ${{ steps.cpr.outputs.pull-request-number }}
      uses: peter-evans/enable-pull-request-automerge@v3
      with:
        pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
        merge-method: squash
        delete-branch: true
